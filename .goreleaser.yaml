# goreleaser config for Hasfy-Relay
# Builds the cross-platform agent (and the relay binary, x86_64 linux for Docker).
# Run via GitHub Actions on tag push v*.
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: agent
    binary: hasfy-agent
    main: ./cmd/agent
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.Commit}}
      - -X main.Date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

  - id: relay
    binary: relay
    main: ./cmd/relay
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.Version={{.Version}}
    goos: [linux]
    goarch: [amd64, arm64]

archives:
  - id: agent-archives
    ids: [agent]
    name_template: "hasfy-agent_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE*
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: HasfyFR
    name: Hasfy-Relay
  prerelease: auto
  draft: false
